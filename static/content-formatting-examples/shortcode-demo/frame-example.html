<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iframe Example</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 1.5rem;
      background: #f5f7fb;
      color: #1f2937;
    }

    .frame-card {
      max-width: 38rem;
      margin: 0 auto;
      padding: 1.25rem;
      border: 1px solid #cbd5e1;
      border-radius: 0.75rem;
      background: #ffffff;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
    }
  </style>
</head>
<body>
  <div class="frame-card">
    <h1>Iframe Example</h1>
    <p>This local HTML file is embedded by the Docsy iframe shortcode.</p>
  </div>
</body>
</html>
